# Phase 2 离线 KD 配置
teacher_model: Qwen/Qwen3.5-9B
student_ckpt: checkpoints/pruned_20260602      # 重建词表(80k,中英OOV≈0)后的新底座
vocab_map: checkpoints/pruned_20260602/vocab_map.json

corpus_file: data/train_zh_en.jsonl           # split_corpus.py 切出的 train(test 对教师不可见，防评测泄漏)
teacher_logits_dir: data/teacher_logits_v2     # 新词表的教师 top-k shard（旧 teacher_logits 已废,new-id 变了）

# 蒸馏超参
topk: 64
temperature: 2.0
alpha_ce: 0.5            # 硬标签 CE 权重
beta_kd: 0.5            # 软标签 KD 权重
directions: [zh2en, en2zh]    # 第一版 zh<->en 双向
max_len: 256
shard_size: 10000

# 训练（24GB：8bit 优化器 + 梯度检查点）
batch_size: 8
grad_accum: 4
lr: 5.0e-5
warmup_ratio: 0.05       # 前 5% step 线性 warmup，防开局发散
steps: 2000
grad_checkpointing: true
teacher_4bit: true       # 9B 教师 nf4 离线导出
